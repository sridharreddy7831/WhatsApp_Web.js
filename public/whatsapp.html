<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WhatsApp Connection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #0d2137 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 32px;
            border-radius: 24px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.82rem;
            margin-bottom: 16px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        h2 {
            margin: 0 0 4px 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 16px;
        }

        /* Status badge */
        .status {
            margin: 10px 0;
            font-weight: 600;
            font-size: 0.88rem;
            padding: 8px 18px;
            border-radius: 20px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .status.online {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.15);
        }

        .status.offline {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.08);
            border: 1px solid rgba(255, 77, 77, 0.15);
        }

        .status.reconnecting {
            color: #ffc107;
            background: rgba(255, 193, 7, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.15);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status.connecting {
            color: #64b5f6;
            background: rgba(100, 181, 246, 0.08);
            border: 1px solid rgba(100, 181, 246, 0.15);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* QR section */
        #qrContainer {
            min-height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #qrContainer img {
            width: 200px;
            margin: 10px 0;
            border-radius: 12px;
            animation: fadeIn 0.4s ease;
        }

        #qrContainer p {
            margin: 10px 0;
            font-size: 0.82rem;
            opacity: 0.6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Reconnect info */
        .reconnect-info {
            margin: 8px 0;
            padding: 10px 14px;
            background: rgba(255, 193, 7, 0.08);
            border: 1px solid rgba(255, 193, 7, 0.15);
            border-radius: 12px;
            font-size: 0.78rem;
            color: #ffe082;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .reconnect-info .retry-count {
            font-weight: 700;
            color: #ffc107;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ffc107;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 12px 0;
        }

        .spinner.blue {
            border-top-color: #64b5f6;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Inputs */
        input,
        textarea {
            width: 100%;
            padding: 11px 14px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            font-family: inherit;
            font-size: 0.88rem;
            background: rgba(255, 255, 255, 0.06);
            color: white;
            transition: border-color 0.3s;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input:focus,
        textarea:focus {
            border-color: rgba(37, 211, 102, 0.4);
        }

        textarea {
            resize: none;
            height: 80px;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            font-family: inherit;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.25);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .disconnect-btn {
            background: linear-gradient(135deg, #ff4d4d, #cc0000);
        }

        .disconnect-btn:hover:not(:disabled) {
            box-shadow: 0 8px 25px rgba(255, 77, 77, 0.25);
        }

        hr {
            margin: 18px 0;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Server down */
        .server-down {
            margin: 8px 0;
            padding: 10px 14px;
            background: rgba(255, 77, 77, 0.08);
            border: 1px solid rgba(255, 77, 77, 0.15);
            border-radius: 12px;
            font-size: 0.78rem;
            color: #ff8a80;
            display: none;
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>

<body>

    <div class="container">

        <a href="/" class="back-link">← Back to Home</a>

        <h2>💬 WhatsApp</h2>
        <p class="subtitle">Connect & send messages</p>

        <div class="status connecting" id="statusText">⏳ Checking connection...</div>

        <div id="reconnectInfo" class="reconnect-info">
            🔄 Auto-reconnecting... Attempt <span id="retryCount" class="retry-count">1</span>
        </div>

        <div id="serverDown" class="server-down">
            ⚠️ Server unreachable — retrying automatically...
        </div>

        <div id="qrContainer"></div>

        <button id="disconnectBtn" class="disconnect-btn" onclick="disconnectWhatsApp()" style="display:none;">
            Disconnect WhatsApp
        </button>

        <hr>

        <input type="text" id="phone" placeholder="Enter 10 digit number">
        <textarea id="message" placeholder="Enter bill message"></textarea>

        <button id="sendBtn" onclick="sendMessage()">Send Message</button>

    </div>

    <script>
        let serverReachable = true;

        async function loadQR() {
            try {
                const res = await fetch("/qr");
                const data = await res.json();

                if (!serverReachable) {
                    serverReachable = true;
                    document.getElementById("serverDown").style.display = "none";
                }

                const statusEl = document.getElementById("statusText");
                const qrContainer = document.getElementById("qrContainer");
                const disconnectBtn = document.getElementById("disconnectBtn");
                const reconnectInfo = document.getElementById("reconnectInfo");
                const sendBtn = document.getElementById("sendBtn");

                if (data.status === "connected" && data.ready) {
                    statusEl.innerHTML = "🟢 WhatsApp Connected";
                    statusEl.className = "status online";
                    qrContainer.innerHTML = "";
                    disconnectBtn.style.display = "block";
                    reconnectInfo.style.display = "none";
                    sendBtn.disabled = false;

                } else if (data.status === "reconnecting") {
                    statusEl.innerHTML = "🔄 Reconnecting...";
                    statusEl.className = "status reconnecting";
                    qrContainer.innerHTML = '<div class="spinner"></div><p>Attempting to reconnect...</p>';
                    disconnectBtn.style.display = "none";
                    reconnectInfo.style.display = "block";
                    document.getElementById("retryCount").textContent = data.reconnectAttempts || 1;
                    sendBtn.disabled = true;

                } else if (data.status === "connecting") {
                    statusEl.innerHTML = "🔵 Waiting for QR Scan";
                    statusEl.className = "status connecting";
                    disconnectBtn.style.display = "none";
                    reconnectInfo.style.display = "none";
                    sendBtn.disabled = true;

                    if (data.qr) {
                        qrContainer.innerHTML = `<img src="${data.qr}" />`;
                    } else {
                        qrContainer.innerHTML = '<div class="spinner blue"></div><p>Generating QR code...</p>';
                    }

                } else {
                    statusEl.innerHTML = "🔴 WhatsApp Not Connected";
                    statusEl.className = "status offline";
                    disconnectBtn.style.display = "none";
                    reconnectInfo.style.display = "none";
                    sendBtn.disabled = true;

                    if (data.qr) {
                        qrContainer.innerHTML = `<img src="${data.qr}" />`;
                    } else {
                        qrContainer.innerHTML = '<p>Waiting for connection...</p>';
                    }
                }
            } catch (err) {
                serverReachable = false;
                document.getElementById("statusText").innerHTML = "⚠️ Server Unreachable";
                document.getElementById("statusText").className = "status offline";
                document.getElementById("serverDown").style.display = "block";
                document.getElementById("reconnectInfo").style.display = "none";
                document.getElementById("qrContainer").innerHTML = "";
                document.getElementById("disconnectBtn").style.display = "none";
                document.getElementById("sendBtn").disabled = true;
            }
        }

        setInterval(loadQR, 3000);
        loadQR();

        async function sendMessage() {
            const phone = document.getElementById("phone").value;
            const message = document.getElementById("message").value;

            if (!phone || !message) {
                alert("❌ Please enter both phone and message");
                return;
            }

            const sendBtn = document.getElementById("sendBtn");
            sendBtn.disabled = true;
            sendBtn.textContent = "Sending...";

            try {
                const res = await fetch("/send", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone, message })
                });

                const data = await res.json();

                if (data.success) {
                    alert("✅ Message Sent Successfully!");
                    document.getElementById("phone").value = "";
                    document.getElementById("message").value = "";
                } else {
                    alert("❌ " + data.error);
                }
            } catch (err) {
                alert("❌ Network error. Please try again.");
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Send Message";
            }
        }

        async function disconnectWhatsApp() {
            const btn = document.getElementById("disconnectBtn");
            btn.disabled = true;
            btn.textContent = "Disconnecting...";

            try {
                const res = await fetch("/disconnect", { method: "POST" });
                const data = await res.json();

                if (data.success) {
                    document.getElementById("statusText").innerHTML = "🔴 WhatsApp Not Connected";
                    document.getElementById("statusText").className = "status offline";
                    document.getElementById("qrContainer").innerHTML =
                        '<div class="spinner blue"></div><p>Generating new QR code...</p>';
                    btn.style.display = "none";

                    let attempts = 0;
                    const qrPoll = setInterval(async () => {
                        attempts++;
                        try {
                            const qrRes = await fetch("/qr");
                            const qrData = await qrRes.json();
                            if (qrData.qr) {
                                document.getElementById("qrContainer").innerHTML =
                                    `<img src="${qrData.qr}" />`;
                                document.getElementById("statusText").innerHTML = "🔵 Waiting for QR Scan";
                                document.getElementById("statusText").className = "status connecting";
                                clearInterval(qrPoll);
                            }
                        } catch (e) { }
                        if (attempts > 30) clearInterval(qrPoll);
                    }, 1000);
                } else {
                    alert("❌ Failed to disconnect: " + (data.error || "Unknown error"));
                }
            } catch (err) {
                alert("❌ Network error while disconnecting");
            } finally {
                btn.disabled = false;
                btn.textContent = "Disconnect WhatsApp";
            }
        }
    </script>

</body>

</html>
