<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bill Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #0d2137 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Animated background orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-orb.orb1 {
            width: 400px;
            height: 400px;
            background: #25D366;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .bg-orb.orb2 {
            width: 350px;
            height: 350px;
            background: #128C7E;
            bottom: -80px;
            right: -80px;
            animation-delay: 3s;
        }

        .bg-orb.orb3 {
            width: 250px;
            height: 250px;
            background: #64b5f6;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            z-index: 1;
        }

        .header .logo {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounceIn 0.8s ease;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #25D366, #64b5f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 400;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Cards container */
        .cards {
            display: flex;
            gap: 28px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }

        /* Card */
        .card {
            width: 260px;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 1.5px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.02));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .card:hover {
            transform: translateY(-12px) scale(1.03);
        }

        .card:active {
            transform: translateY(-4px) scale(0.98);
        }

        /* WhatsApp card */
        .card.whatsapp {
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.12), rgba(18, 140, 126, 0.08));
            backdrop-filter: blur(20px);
        }

        .card.whatsapp:hover {
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.2), rgba(18, 140, 126, 0.15));
            box-shadow: 0 20px 60px rgba(37, 211, 102, 0.2), 0 0 40px rgba(37, 211, 102, 0.08);
        }

        /* Bill card */
        .card.bill {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.12), rgba(66, 133, 244, 0.08));
            backdrop-filter: blur(20px);
        }

        .card.bill:hover {
            background: linear-gradient(135deg, rgba(100, 181, 246, 0.2), rgba(66, 133, 244, 0.15));
            box-shadow: 0 20px 60px rgba(100, 181, 246, 0.2), 0 0 40px rgba(100, 181, 246, 0.08);
        }

        .card .icon {
            font-size: 3.5rem;
            margin-bottom: 18px;
            display: block;
            transition: transform 0.3s ease;
        }

        .card:hover .icon {
            transform: scale(1.15);
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        .card .arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .card:hover .arrow {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
        }

        /* Footer */
        .footer {
            margin-top: 50px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.25);
            position: relative;
            z-index: 1;
        }

        /* Staggered animation */
        .card:nth-child(1) {
            animation: slideUp 0.6s ease 0.1s both;
        }

        .card:nth-child(2) {
            animation: slideUp 0.6s ease 0.25s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .cards {
                flex-direction: column;
                align-items: center;
            }

            .card {
                width: 280px;
            }

            .header h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <div class="bg-orb orb3"></div>

    <div class="header">
        <div class="logo">💼</div>
        <h1>WhatsApp Bill Manager</h1>
        <p>Send bills & manage invoices via WhatsApp</p>
    </div>

    <div class="cards">

        <a href="/whatsapp.html" class="card whatsapp">
            <span class="icon">💬</span>
            <h3>WhatsApp</h3>
            <p>Connect, scan QR & send messages directly via WhatsApp</p>
            <div class="arrow">→</div>
        </a>

        <a href="/bill.html" class="card bill">
            <span class="icon">🧾</span>
            <h3>Bill Generate</h3>
            <p>Create invoices, save & share as PDF via WhatsApp</p>
            <div class="arrow">→</div>
        </a>

    </div>

    <div class="footer">Powered by WhatsApp Web.js</div>

</body>

</html>
