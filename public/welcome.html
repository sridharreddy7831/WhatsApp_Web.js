<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #1a2744 50%, #0d2137 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #25D366, #64b5f6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.3);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.6);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 id="welcome-msg">Welcome</h1>
        <p>You have successfully logged in.</p>
        <button class="btn btn-logout" onclick="logout()">Logout 🚪</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/auth/session');
                const data = await res.json();
                if (data.loggedIn) {
                    document.getElementById('welcome-msg').textContent = `Welcome @${data.phone}`;
                } else {
                    document.getElementById('welcome-msg').textContent = "Welcome Guest";
                    window.location.href = '/login.html'; // Redirect if not logged in
                }
            } catch (e) {
                console.error("Error fetching session", e);
            }
        });

        async function logout() {
            try {
                await fetch('/auth/logout', { method: 'POST' });
                window.location.href = '/';
            } catch (e) {
                console.error("Logout failed", e);
                window.location.href = '/';
            }
        }
    </script>

</body>

</html>
